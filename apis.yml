aid: currencybeacon
name: CurrencyBeacon
description: >-
  Currency exchange rates REST API providing real-time mid-market rates for 170+
  fiat currencies and cryptocurrencies, with 30 years of historical data, server-side
  conversion, timeseries analysis, and MCP server support for LLM integrations.
  Sourced from central banks and trusted financial institutions with 99.99% uptime.
